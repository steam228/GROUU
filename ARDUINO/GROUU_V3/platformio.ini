; ============================================================================
;  WellBouy - Well-water-quality LoRaWAN sensor node
;  Target: Seeed Studio XIAO ESP32-S3 + Wio-SX1262 LoRa module
; ============================================================================
;
;  RadioLib is PINNED to 6.6.0 on purpose. The LoRaWAN class API changed in
;  later releases and will not compile against the code here.
;  Do NOT bump it without revisiting the LoRaWAN glue.
;
;  ENVIRONMENTS
;  ------------
;  prod        - full integration firmware (src/main.cpp + all drivers, deep sleep)
;  b01_lorawan - bring-up: radio + OTAA join + dummy uplink   <-- START HERE
;  b02_temp    - bring-up: DS18B20 only        (to be added)
;  b03_tds     - bring-up: TDS only            (to be added)
;  b04_turbidity - bring-up: SEN0189 only      (to be added)
;  b05_ph      - bring-up: pH only             (to be added)
;
;  Flash one stage at a time, e.g.:
;     pio run -e b01_lorawan -t upload && pio device monitor
; ============================================================================

; ---- Settings shared by every environment ---------------------------------
[env]
; Pinned to the stable official platform (Arduino core 2.0.x). The default
; "espressif32" on this machine resolves to the pioarduino 55.x fork, whose
; toolchain/esptool packages are broken; 6.13.0 uses the working
; toolchain-xtensa-esp32s3 8.4.0. RadioLib 6.6.0 is fully compatible.
platform  = espressif32@6.13.0
board     = seeed_xiao_esp32s3
framework = arduino

monitor_speed   = 115200
upload_speed    = 921600
monitor_filters = esp32_exception_decoder, time

build_flags =
    ; Serial debug for production (src/main.cpp). Set 0 for a quiet build.
    -D DEBUG=1
    -D CORE_DEBUG_LEVEL=0
    ; Let bring-up sketches under src/bringup/** include the shared drivers
    ; as "sensors/<driver>.h" (resolves against src/).
    -I src

lib_deps =
    ; --- Radio / LoRaWAN -----------------------------------------------------
    jgromes/RadioLib @ 6.6.0          ; EXACT version, see note above
    ; --- Payload encoding ----------------------------------------------------
    electroniccats/CayenneLPP @ ^1.4.0
    ; --- DS18B20 temperature -------------------------------------------------
    milesburton/DallasTemperature @ ^3.11.0
    paulstoffregen/OneWire @ ^2.3.8
    ; --- ADS1115 external ADC (DFRobot Gravity I2C ADS1115) ------------------
    adafruit/Adafruit ADS1X15 @ ^2.5.0

; ---- Production / integration firmware ------------------------------------
[env:prod]
; Everything in src/ EXCEPT the bring-up sketches.
build_src_filter = +<*> -<bringup/>

; ---- Bring-up 01: LoRaWAN comms only --------------------------------------
; Proves: radio wiring, keys, local gateway, TTN join, and the uplink path.
; No sensors, no deep sleep - just join and send an incrementing counter.
[env:b01_lorawan]
build_src_filter = -<*> +<bringup/01_lorawan_join/>

; ---- Bring-up 02: DS18B20 temperature -------------------------------------
; Reads water temperature in isolation. The SEND_LORA flag in the sketch
; toggles serial-only vs join+uplink to TTN.
[env:b02_temp]
build_src_filter = -<*> +<bringup/02_temp/> +<sensors/temp_sensor.cpp>

; ---- Bring-up 03: TDS via DFRobot I2C ADS1115 -----------------------------
; TDS analog output -> ADS1115 channel -> I2C -> XIAO. Reads in isolation
; (25 C default, no DS18B20). SEND_LORA flag toggles serial-only vs uplink.
[env:b03_tds]
build_src_filter = -<*> +<bringup/03_tds/> +<sensors/tds_sensor.cpp>

; ---- Bring-up 04: Turbidity (SEN0189) via I2C ADS1115 (A1) ----------------
[env:b04_turbidity]
build_src_filter = -<*> +<bringup/04_turbidity/>

; ---- Inject: combined temp + TDS + turbidity uplink (for the data pipeline) -
[env:b_inject]
build_src_filter = -<*> +<bringup/inject/> +<sensors/temp_sensor.cpp> +<sensors/tds_sensor.cpp> +<sensors/turbidity_sensor.cpp>

; ---- Bring-up 05: pH (Phidgets 1130) via I2C ADS1115 (A2) ------------------
; 5 V ratiometric adapter through the 10k/18k divider -> ADS A2. Two-point cal
; (pH 4 / pH 7) lives in config.h. SEND_LORA flag toggles serial-only vs uplink.
[env:b05_ph]
build_src_filter = -<*> +<bringup/05_ph/> +<sensors/ph_sensor.cpp>
